<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추출기 — Harness Engineering Demo</title>
  <style>
    :root {
      --brand: #0d6b64;
      --accent: #c97a17;
      --bg: #f5f1e8;
      --surface: rgba(255,255,255,0.9);
      --ink: #1a2332;
      --muted: #4a5568;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 15% 10%, rgba(13,107,100,.12), transparent 28%),
                  radial-gradient(circle at 85% 12%, rgba(201,122,23,.10), transparent 28%),
                  linear-gradient(180deg, #f6f4f0 0%, #f8f9f7 100%);
      min-height: 100vh;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px -12px rgba(16,32,51,.18);
      padding: 36px 32px;
      width: min(480px, 100%);
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 8px;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    select, input[type="date"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid rgba(16,32,51,.15);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: var(--ink);
      outline: none;
      transition: border-color .15s;
    }
    select:focus, input[type="date"]:focus {
      border-color: var(--brand);
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--brand), #134e4a);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .9; }
    .hint {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 10px;
    }
    #output {
      margin-top: 28px;
      min-height: 40px;
    }
    .tag {
      display: inline-block;
      font-size: 11px;
      background: rgba(13,107,100,.1);
      color: var(--brand);
      border-radius: 6px;
      padding: 2px 8px;
      margin-top: 24px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Harness Engineering Demo</div>
    <h1>로또 번호 추출기</h1>
    <p class="subtitle">Before state — 기본 random 추출</p>

    <div class="field">
      <label for="count">게임 수</label>
      <select id="count">
        <option value="1">1 게임</option>
        <option value="2">2 게임</option>
        <option value="3" selected>3 게임</option>
        <option value="4">4 게임</option>
        <option value="5">5 게임</option>
      </select>
    </div>

    <button class="btn" id="draw">번호 뽑기</button>
    <p class="hint" id="hint">버튼을 눌러 번호를 뽑으세요</p>

    <div id="output"></div>

    <span class="tag">Before — plans/active 없이도 실행 가능한 UI</span>
  </div>

  <script type="module">
    import { bindControls } from "./src/ui/input.js";

    bindControls({
      drawBtn: document.getElementById("draw"),
      countSel: document.getElementById("count"),
      output: document.getElementById("output"),
    });
  </script>
</body>
</html>
